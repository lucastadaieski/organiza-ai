<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Criar Conta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-indigo-600">OrganizaAI</h1>
        <p class="text-slate-500 mt-2">Crie sua conta para organizar eventos</p>
    </div>

    <form id="form-registro" class="space-y-4">
        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Nome Completo</label>
            <input type="text" id="nome" required placeholder="Ex: Lucas Silva"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Senha</label>
            <input type="password" id="senha" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Confirmar Senha</label>
            <input type="password" id="confirmar-senha" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <button type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition-all transform active:scale-95">
            Criar minha conta
        </button>
    </form>

    <div id="mensagem-erro" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium"></div>

    <p class="mt-8 text-center text-slate-500 text-sm">
        Já tem uma conta? <a href="/login" class="text-indigo-600 font-bold hover:underline">Fazer Login</a>
    </p>
</div>

<script src="/js/registrar.js"></script>
</body>
</html>
