<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Meus Eventos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white border-b border-slate-200 p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-black text-indigo-600">OrganizaAI</h1>

        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-slate-600">
                Olá, <span id="nav-nome-usuario" class="font-bold text-slate-800">Carregando...</span>
            </span>
            <div class="h-6 w-px bg-slate-200"></div> <button onclick="fazerLogout()" class="text-sm font-bold text-red-500 hover:text-red-700 transition-colors">
            Sair
        </button>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto p-8">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold text-slate-800">Seus Eventos</h2>
        <button onclick="window.location.href='/novo-evento'" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all">
            + Criar Evento
        </button>
    </div>

    <div id="lista-eventos" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <p class="text-slate-400">Carregando seus eventos...</p>
    </div>
</main>

<script src="/js/dashboard.js"></script>
</body>
</html>
