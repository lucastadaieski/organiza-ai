<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Criar Evento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8">

<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="window.location.href='/dashboard'" class="text-slate-500 hover:text-indigo-600 transition-colors">
            ← Voltar
        </button>
        <h1 class="text-3xl font-black text-slate-800">Novo Evento</h1>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
        <form id="form-evento" class="space-y-6">

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nome do Evento</label>
                <input type="text" id="titulo" required placeholder="Ex: Churrasco da Turma"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Descrição (Opcional)</label>
                <textarea id="descricao" rows="2" placeholder="Ex: Comemorar a aprovação no semestre!"
                          class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></textarea>
            </div>

            <hr class="border-slate-100">

            <div>
                <div class="flex justify-between items-center mb-4">
                    <label class="block text-sm font-bold text-slate-700">Datas Sugeridas para Votação</label>
                    <button type="button" onclick="adicionarCampoData()" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1 rounded-lg">
                        + Adicionar Data
                    </button>
                </div>

                <div id="container-datas" class="space-y-3">
                    <div class="flex gap-2 data-input-group">
                        <input type="date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-submit"
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition-all active:scale-95 mt-4">
                Criar e Gerar Link
            </button>

            <div id="msg-erro" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium"></div>
        </form>
    </div>
</div>

<script src="/js/novo-evento.js"></script>
</body>
</html>
