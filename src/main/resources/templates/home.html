<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrganizaAI - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<nav class="bg-white border-b border-gray-200 fixed w-full z-20 top-0 start-0">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a href="/" class="text-2xl font-black text-indigo-600 tracking-tighter">OrganizaAI</a>

    <div id="nav-actions" class="flex items-center space-x-3">
      <a href="/login" id="btn-login" class="hidden text-gray-600 hover:text-indigo-600 font-semibold px-4 py-2">Entrar</a>
      <a href="/registrar" id="btn-registrar" class="hidden bg-indigo-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition-all">Registrar</a>

      <a href="/painel" id="btn-painel" class="hidden border border-indigo-600 text-indigo-600 px-5 py-2.5 rounded-lg font-bold hover:bg-indigo-50 transition-all">Meu Painel</a>
    </div>
  </div>
</nav>

<main class="pt-32 pb-20 px-4 text-center">
  <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-6 leading-tight">
    Seus eventos, <br><span class="text-indigo-600 italic">organizados de verdade.</span>
  </h1>
  <p class="text-lg text-slate-600 max-w-2xl mx-auto mb-10">
    Crie votações de datas e gerencie colaborações em um só lugar. Chega de confusão no grupo da família.
  </p>

  <div id="hero-actions">
    <a href="/registrar" id="hero-main-btn" class="bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-xl hover:bg-indigo-700 transition-transform hover:scale-105 inline-block">
      Começar agora - É Grátis
    </a>
  </div>
</main>

<script src="/js/home.js"></script>
</body>
</html>
