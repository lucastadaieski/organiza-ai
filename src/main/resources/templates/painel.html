<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Painel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<nav class="bg-white border-b border-slate-200 p-4">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-black text-indigo-600">OrganizaAI</h1>

        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-slate-600">
                Olá, <span id="nav-nome-usuario" class="font-bold text-slate-800">Carregando...</span>
            </span>
            <div class="h-6 w-px bg-slate-200"></div> <button onclick="fazerLogout()" class="text-sm font-bold text-red-500 hover:text-red-700 transition-colors">
            Sair
        </button>
        </div>
    </div>
</nav>


<body class="bg-gray-50 text-gray-800 font-sans p-8">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border border-gray-100">

    <div class="border-b pb-4 mb-6">
        <h1 class="text-3xl font-extrabold text-indigo-600">🥩 Churrasco da Turma</h1>
        <p class="text-gray-500 mt-2 flex items-center gap-2">
            Status da Votação: <span id="status-badge" class="bg-gray-200 text-gray-600 px-2 py-1 rounded text-xs">Carregando...</span>
        </p>
    </div>

    <h2 class="text-xl font-bold mb-4">Opções de Data</h2>

    <div id="container-datas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <p class="text-gray-400 italic">Buscando informações do servidor...</p>
    </div>

</div>

<script src="/js/doodle.js"></script>

</html>
