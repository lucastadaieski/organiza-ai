<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Nova Senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-black text-indigo-600">Criar Nova Senha</h1>
        <p class="text-slate-500 mt-2 text-sm">Digite sua nova senha de acesso.</p>
    </div>

    <form id="form-redefinir" class="space-y-4">
        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Nova Senha</label>
            <input type="password" id="nova-senha" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Confirmar Nova Senha</label>
            <input type="password" id="confirmar-nova-senha" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <button type="submit" id="btn-submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
            Redefinir Senha
        </button>
    </form>

    <div id="msg-erro" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium"></div>
</div>

<script>
    // Pega o token gigante que veio no e-mail (na URL)
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
        document.getElementById('msg-erro').innerText = "Link inválido ou expirado.";
        document.getElementById('msg-erro').classList.remove('hidden');
        document.getElementById('btn-submit').disabled = true;
    }

    document.getElementById('form-redefinir').addEventListener('submit', async (e) => {
        e.preventDefault();

        const novaSenha = document.getElementById('nova-senha').value;
        const confirmarSenha = document.getElementById('confirmar-nova-senha').value;
        const msgErro = document.getElementById('msg-erro');

        if (novaSenha !== confirmarSenha) {
            msgErro.innerText = "As senhas não coincidem!";
            msgErro.classList.remove('hidden');
            return;
        }

        msgErro.classList.add('hidden');
        const btn = document.getElementById('btn-submit');
        btn.innerText = "Redefinindo...";

        try {
            // Chama o back-end passando token e novaSenha via URL Params, conforme seu Controller
            const response = await fetch(`/auth/reset-password?token=${encodeURIComponent(token)}&novaSenha=${encodeURIComponent(novaSenha)}`, {
                method: 'POST'
            });

            if (response.ok) {
                alert("Senha alterada com sucesso! Faça login com a nova senha.");
                window.location.href = "/login";
            } else {
                const textoErro = await response.text();
                msgErro.innerText = textoErro || "Token inválido ou expirado.";
                msgErro.classList.remove('hidden');
            }
        } catch (error) {
            msgErro.innerText = "Erro ao conectar com o servidor.";
            msgErro.classList.remove('hidden');
        } finally {
            btn.innerText = "Redefinir Senha";
        }
    });
</script>
</body>
</html>
