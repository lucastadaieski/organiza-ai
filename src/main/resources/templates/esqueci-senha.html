<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrganizaAI - Esqueci Minha Senha</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md">
  <div class="text-center mb-6">
    <h1 class="text-2xl font-black text-indigo-600">Recuperar Senha</h1>
    <p class="text-slate-500 mt-2 text-sm">Digite o e-mail cadastrado e enviaremos um link para você criar uma nova senha.</p>
  </div>

  <form id="form-esqueci" class="space-y-4">
    <div>
      <label class="block text-sm font-bold text-slate-700 mb-1">Seu E-mail</label>
      <input type="email" id="email" required placeholder="seu@email.com"
             class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
    </div>

    <button type="submit" id="btn-submit"
            class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
      Enviar link de recuperação
    </button>
  </form>

  <div id="msg-feedback" class="hidden mt-4 p-3 text-sm rounded-lg text-center font-medium"></div>

  <p class="mt-6 text-center text-slate-500 text-sm">
    Lembrou a senha? <a href="/login" class="text-indigo-600 font-bold hover:underline">Voltar para o Login</a>
  </p>
</div>

<script>
  document.getElementById('form-esqueci').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = document.getElementById('btn-submit');
    const msgBox = document.getElementById('msg-feedback');

    btn.innerText = "Enviando...";
    btn.disabled = true;
    msgBox.classList.add('hidden');

    try {
      // Seu Java espera o e-mail como RequestParam na URL
      const response = await fetch(`/auth/forgot-password?email=${encodeURIComponent(email)}`, {
        method: 'POST'
      });

      if (response.ok) {
        msgBox.className = "mt-4 p-3 text-sm rounded-lg text-center font-medium bg-green-50 text-green-700";
        msgBox.innerText = "Se o e-mail existir, você receberá o link em instantes.";
        msgBox.classList.remove('hidden');
      } else {
        msgBox.className = "mt-4 p-3 text-sm rounded-lg text-center font-medium bg-red-50 text-red-600";
        msgBox.innerText = "Erro ao solicitar recuperação. Tente novamente.";
        msgBox.classList.remove('hidden');
      }
    } catch (error) {
      msgBox.className = "mt-4 p-3 text-sm rounded-lg text-center font-medium bg-red-50 text-red-600";
      msgBox.innerText = "Servidor offline ou erro de rede.";
      msgBox.classList.remove('hidden');
    } finally {
      btn.innerText = "Enviar link de recuperação";
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
