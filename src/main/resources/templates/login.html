<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganizaAI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-indigo-600">OrganizaAI</h1>
        <p class="text-slate-500 mt-2">Bem-vindo de volta!</p>
    </div>

    <form id="form-login" class="space-y-4">
        <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">E-mail</label>
            <input type="email" id="email" required placeholder="seu@email.com"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div id="campo-senha">
            <label class="block text-sm font-bold text-slate-700 mb-1">Senha</label>
            <input type="password" id="senha" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <div class="flex justify-end mt-1 mb-4">
            <a href="/esqueci-senha" class="text-sm text-indigo-600 font-bold hover:underline">
                Esqueceu a senha?
            </a>
        </div>

        <div id="campo-mfa" class="hidden">
            <label class="block text-sm font-bold text-indigo-600 mb-1">Código MFA (App)</label>
            <input type="text" id="mfa-code" placeholder="000000"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
        </div>

        <button type="submit" id="btn-submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition-all active:scale-95">
            Entrar
        </button>
    </form>

    <div id="msg-erro" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium"></div>

    <p class="mt-8 text-center text-slate-500 text-sm">
        Novo por aqui? <a href="/registrar" class="text-indigo-600 font-bold hover:underline">Criar uma conta</a>
    </p>
</div>

<script src="/js/login.js"></script>
</body>
</html>
